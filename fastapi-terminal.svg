<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">

<style>
    .bg {
        fill:#0d1117;
        stroke:#30363d;
        stroke-width:1;
    }

    .title{
        fill:#8b949e;
        font:14px 'Fira Code', monospace;
    }

    .text{
        fill:#00F5D4;
        font:18px 'Fira Code', monospace;
        opacity:0;
    }

    .cursor{
        fill:#00F5D4;
        animation:blink 1s infinite;
    }

    @keyframes blink{
        0%,45%{opacity:1;}
        46%,100%{opacity:0;}
    }
</style>

<rect class="bg" x="5" y="5" rx="10" width="890" height="270"></rect>

<circle cx="25" cy="22" r="6" fill="#ff5f56"></circle>
<circle cx="45" cy="22" r="6" fill="#ffbd2e"></circle>
<circle cx="65" cy="22" r="6" fill="#27c93f"></circle>

<text x="90" y="27" class="title">uvicorn@shashwat:~/portfolio</text>

<text x="30" y="60" class="text">
INFO:     Started server process [2645]
<animate attributeName="opacity" values="0;1;1" begin="0s" dur="12s" fill="freeze"></animate>
</text>

<text x="30" y="90" class="text">
INFO:     Waiting for application startup.
<animate attributeName="opacity" values="0;0;1;1" begin="0s" dur="12s" fill="freeze"></animate>
</text>

<text x="30" y="120" class="text">
INFO:     Application startup complete.
<animate attributeName="opacity" values="0;0;0;1;1" begin="0s" dur="12s" fill="freeze"></animate>
</text>

<text x="30" y="150" class="text">
INFO:     Uvicorn running on http://127.0.0.1:8000
<animate attributeName="opacity" values="0;0;0;0;1;1" begin="0s" dur="12s" fill="freeze"></animate>
</text>

<text x="30" y="180" class="text">
GET /profile ...................... 200 OK
<animate attributeName="opacity" values="0;0;0;0;0;1;1" begin="0s" dur="12s" fill="freeze"></animate>
</text>

<text x="30" y="210" class="text">
GET /tech-stack ................... 200 OK
<animate attributeName="opacity" values="0;0;0;0;0;0;1;1" begin="0s" dur="12s" fill="freeze"></animate>
</text>

<text x="30" y="240" class="text">
POST /connect ..................... 201 Created
<animate attributeName="opacity" values="0;0;0;0;0;0;0;1" begin="0s" dur="12s" fill="freeze"></animate>
</text>

<rect x="470" y="226" width="10" height="18" class="cursor"></rect>

</svg>